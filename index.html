<!doctype html>

<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width,initial-scale=1" name="viewport" />
        <title>Horsey Save Editor</title>
        <style>
            :root {
                --bg: #151922;
                --panel: #1e2633;
                --panel2: #252f3f;
                --panel3: #2d394c;
                --text: #edf2f7;
                --muted: #9aa8bb;
                --soft: #c7d2e1;
                --border: #3b4a61;
                --accent: #7dd3fc;
                --good: #86efac;
                --warn: #facc15;
                --bad: #fb7185;
                --shadow: rgba(0, 0, 0, 0.28);
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                background: linear-gradient(180deg, #111722, var(--bg));
                color: var(--text);
                font:
                    14px/1.45 system-ui,
                    Segoe UI,
                    Roboto,
                    Arial,
                    sans-serif;
            }
            header {
                padding: 24px;
                border-bottom: 1px solid var(--border);
                background: #1a2230;
            }
            h1 {
                margin: 0 0 6px;
                font-size: 24px;
            }
            h2 {
                margin: 0 0 14px;
                font-size: 18px;
            }
            h3 {
                margin: 0 0 10px;
                font-size: 15px;
            }
            p {
                margin: 8px 0;
                color: var(--soft);
            }
            code,
            .mono {
                font-family:
                    "Fira Code", "Cascadia Code", ui-monospace, SFMono-Regular,
                    Menlo, Consolas, monospace;
            }
            main {
                display: grid;
                grid-template-columns: 380px 1fr;
                gap: 16px;
                padding: 16px;
                max-width: 1500px;
                margin: 0 auto;
            }
            .card {
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 16px;
                box-shadow: 0 10px 28px var(--shadow);
                overflow: hidden;
            }
            .card .hd {
                padding: 14px 16px;
                background: var(--panel2);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
            }
            .card .bd {
                padding: 14px 16px;
            }
            .stack {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .row {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .row.wrap {
                flex-wrap: wrap;
            }
            .spread {
                justify-content: space-between;
            }
            input,
            select,
            button,
            textarea {
                font: inherit;
            }
            input[type="file"],
            input[type="text"],
            input[type="number"],
            select,
            textarea {
                background: #111827;
                color: var(--text);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 8px 10px;
            }
            input[type="number"] {
                width: 120px;
            }
            button {
                background: linear-gradient(180deg, #38bdf8, #0284c7);
                border: 0;
                color: #041018;
                font-weight: 700;
                border-radius: 10px;
                padding: 9px 12px;
                cursor: pointer;
            }
            button.secondary {
                background: #334155;
                color: var(--text);
                border: 1px solid var(--border);
            }
            button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            .small {
                font-size: 12px;
                color: var(--muted);
            }
            .pill {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                border: 1px solid var(--border);
                background: #111827;
                border-radius: 999px;
                padding: 3px 8px;
                font-size: 12px;
                color: var(--soft);
            }
            .pill.good {
                border-color: #22c55e66;
                color: var(--good);
            }
            .pill.warn {
                border-color: #eab30866;
                color: var(--warn);
            }
            .pill.bad {
                border-color: #f43f5e66;
                color: var(--bad);
            }
            .list {
                max-height: 70vh;
                overflow: auto;
                display: flex;
                flex-direction: column;
                gap: 8px;
                padding-right: 4px;
            }
            .item {
                border: 1px solid var(--border);
                background: #172030;
                border-radius: 12px;
                padding: 10px;
                cursor: pointer;
            }
            .item:hover,
            .item.active {
                border-color: var(--accent);
                background: #1c2a3d;
            }
            .item .name {
                font-weight: 750;
            }
            .grid2 {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .grid3 {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }
            .prop-list {
                display: flex;
                flex-direction: column;
                border: 1px solid var(--border);
                border-radius: 14px;
                overflow: hidden;
            }
            .prop {
                display: grid;
                grid-template-columns: 230px 180px 1fr;
                gap: 10px;
                align-items: center;
                padding: 10px 12px;
                border-bottom: 1px solid var(--border);
                background: #172030;
            }
            .prop:last-child {
                border-bottom: 0;
            }
            .prop:nth-child(even) {
                background: #192335;
            }
            .prop label {
                font-weight: 650;
                color: #e5edf8;
            }
            .derived {
                color: var(--muted);
            }
            .section-row {
                display: grid;
                grid-template-columns: 150px 120px 110px 1fr;
                gap: 10px;
                align-items: center;
                padding: 9px 10px;
                border-bottom: 1px solid var(--border);
            }
            .section-row:last-child {
                border-bottom: 0;
            }
            .hex {
                white-space: pre-wrap;
                word-break: break-word;
                background: #101722;
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 10px;
                color: #d7e2f0;
                max-height: 220px;
                overflow: auto;
            }
            .warnbox {
                border: 1px solid #eab30866;
                background: #42200655;
                border-radius: 12px;
                padding: 10px;
                color: #fde68a;
            }
            .goodbox {
                border: 1px solid #22c55e66;
                background: #052e1655;
                border-radius: 12px;
                padding: 10px;
                color: #bbf7d0;
            }
            details {
                border: 1px solid var(--border);
                border-radius: 12px;
                background: #172030;
                padding: 10px;
            }
            summary {
                cursor: pointer;
                font-weight: 700;
            }
            .dna-table {
                display: flex;
                flex-direction: column;
                gap: 6px;
                margin-top: 10px;
            }
            .dna-row {
                display: grid;
                grid-template-columns: 70px repeat(16, minmax(34px, 1fr));
                gap: 4px;
                align-items: center;
            }
            .dna-off {
                font-size: 11px;
                color: var(--muted);
            }
            .dna-byte {
                width: 100%;
                min-width: 32px;
                text-align: center;
                padding: 5px 2px;
                border-radius: 8px;
                font-family:
                    "Fira Code", "Cascadia Code", ui-monospace, SFMono-Regular,
                    Menlo, Consolas, monospace;
                text-transform: lowercase;
            }
            .dna-byte.changed {
                border-color: var(--warn);
                box-shadow: 0 0 0 1px #eab30855;
            }
            .adjacent-grid {
                display: grid;
                grid-template-columns: repeat(8, minmax(44px, 1fr));
                gap: 6px;
            }

            .mapped-dna-editor {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .dna-toolbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-wrap: wrap;
                gap: 10px;
                border: 1px solid var(--border);
                background: #172030;
                border-radius: 14px;
                padding: 10px;
            }
            .dna-legend {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }
            .helix-grid {
                display: grid;
                gap: 12px;
            }
            .helix {
                border: 1px solid var(--border);
                background: #111827;
                border-radius: 16px;
                overflow: hidden;
            }
            .helix-head {
                padding: 10px 12px;
                background: var(--panel2);
                border-bottom: 1px solid var(--border);
                display: flex;
                justify-content: space-between;
                gap: 10px;
                align-items: center;
            }
            .helix-title {
                font-weight: 800;
                font-family:
                    "Fira Code", "Cascadia Code", ui-monospace, SFMono-Regular,
                    Menlo, Consolas, monospace;
            }
            .strands {
                padding: 12px;
                display: grid;
                gap: 8px;
                overflow-x: auto;
            }
            .strand {
                display: grid;
                grid-template-columns: 42px max-content;
                gap: 10px;
                align-items: center;
            }
            .strand-label {
                color: var(--muted);
                font-family:
                    "Fira Code", "Cascadia Code", ui-monospace, SFMono-Regular,
                    Menlo, Consolas, monospace;
                font-size: 12px;
            }
            .bases {
                display: flex;
                gap: 5px;
            }
            .base {
                width: 32px;
                height: 32px;
                border-radius: 10px;
                border: 1px solid var(--border);
                background: #111827;
                font-family:
                    "Fira Code", "Cascadia Code", ui-monospace, SFMono-Regular,
                    Menlo, Consolas, monospace;
                font-weight: 800;
                color: var(--text);
                display: inline-grid;
                place-items: center;
                padding: 0;
            }
            .base:hover:not(:disabled) {
                border-color: var(--accent);
                background: #1c2a3d;
            }
            .base.changed {
                color: var(--warn);
                border-color: #eab308aa;
                box-shadow: inset 0 0 0 1px #eab30833;
            }
            .base.unresolved {
                color: var(--bad);
                border-color: #f43f5e66;
            }
            .base:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }
            .raw-wrap {
                max-height: 420px;
                overflow: auto;
                border: 1px solid var(--border);
                border-radius: 14px;
            }
            .raw-table {
                width: 100%;
                border-collapse: collapse;
                font-family:
                    "Fira Code", "Cascadia Code", ui-monospace, SFMono-Regular,
                    Menlo, Consolas, monospace;
                font-size: 12px;
            }
            .raw-table th,
            .raw-table td {
                border-bottom: 1px solid var(--border);
                padding: 7px 8px;
                text-align: left;
                white-space: nowrap;
            }
            .raw-table th {
                color: var(--muted);
                background: var(--panel2);
                position: sticky;
                top: 0;
            }
            .raw-table tr.changed td {
                color: var(--warn);
            }

            /* In-game DNA editor merged from the C.R.I.S.P.R editor. */
            .game-dna-editor {
                --A: #facc15;
                --T: #fb7185;
                --C: #60a5fa;
                --G: #4ade80;
                --inverse-text: #181b22;
                --accent-soft: rgba(56, 189, 248, 0.16);
                --accent-ring-strong: rgba(125, 211, 252, 0.62);
                --green-hi: #86efac;
                --red-lo: #fca5a5;
                --warn-soft: #fde68a;
                --dim: #748297;
                --chip-label: #c8d3df;
                --gene-card-bg: #202733;
                --tooltip-bg: #161d26;
                display: grid;
                gap: 12px;
            }
            .game-dna-toolbar {
                display: flex;
                justify-content: space-between;
                gap: 12px;
                align-items: flex-start;
                flex-wrap: wrap;
            }
            .game-dna-input {
                display: grid;
                gap: 10px;
            }
            .game-dna-input textarea {
                min-height: 150px;
                font-family:
                    "Fira Code", "Cascadia Code", ui-monospace, SFMono-Regular,
                    Menlo, Consolas, monospace;
                line-height: 1.45;
            }
            .game-dna-legend {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }
            .game-dna-results {
                display: grid;
                gap: 12px;
            }
            .game-result-helix {
                background: #172030;
                border: 1px solid var(--border);
                border-radius: 16px;
                box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
                overflow: visible;
            }
            .game-result-header {
                display: flex;
                align-items: stretch;
                justify-content: space-between;
                gap: 14px;
                padding: 13px 15px;
                background: linear-gradient(
                    180deg,
                    var(--panel3),
                    var(--panel2)
                );
                border-bottom: 1px solid var(--border);
                border-top-left-radius: 16px;
                border-top-right-radius: 16px;
            }
            .game-result-header:only-child {
                border-bottom-left-radius: 16px;
                border-bottom-right-radius: 16px;
                border-bottom: none;
            }
            .game-result-heading {
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 3px;
                min-width: 0;
                flex: 1 1 auto;
            }
            .game-helix-title {
                font-weight: 800;
                font-size: 14px;
                letter-spacing: 0.01em;
                line-height: 1.25;
            }
            .game-helix-subtitle {
                color: var(--soft);
                font-size: 12px;
                font-weight: 600;
                opacity: 0.92;
            }
            .game-result-body {
                padding: 14px 16px 16px;
            }
            .game-strand-stack {
                display: flex;
                flex-direction: column;
                gap: 6px;
                align-items: flex-end;
                justify-content: center;
                flex: 0 0 auto;
                max-width: 58%;
            }
            .game-strand-row {
                display: flex;
                align-items: center;
                justify-content: flex-end;
                gap: 6px;
                flex-wrap: nowrap;
                min-height: 22px;
            }
            .game-strand-label {
                color: var(--chip-label);
                font-size: 10px;
                font-weight: 800;
                width: 24px;
                flex: 0 0 24px;
                text-align: right;
                letter-spacing: 0.06em;
            }
            .game-result-genes {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                align-items: stretch;
            }
            .game-result-gene {
                position: relative;
                z-index: 0;
                background: var(--gene-card-bg);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 10px;
                min-width: 154px;
                cursor: pointer;
                text-align: left;
                color: inherit;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                align-items: flex-start;
                transition:
                    border-color 0.12s ease,
                    transform 0.08s ease,
                    box-shadow 0.12s ease;
            }
            .game-result-gene:hover,
            .game-result-gene:focus-visible {
                z-index: 20;
                border-color: var(--accent) !important;
                outline: none;
                transform: translateY(-1px);
                box-shadow:
                    0 0 0 3px var(--accent-soft),
                    0 10px 20px rgba(0, 0, 0, 0.18);
            }
            .game-rpos {
                color: var(--dim);
                font-size: 10px;
                font-weight: 600;
                margin-top: 3px;
            }
            .game-rname {
                font-size: 12px;
                font-weight: 800;
                margin: 0 0 2px;
                letter-spacing: 0.02em;
                line-height: 1.3;
            }
            .game-rval {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
                font-size: 11px;
                margin-top: 8px;
            }
            .game-allele-line {
                display: flex;
                align-items: center;
                gap: 4px;
                flex-wrap: wrap;
            }
            .game-gene-mixed-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
                margin-top: 8px;
                width: 100%;
            }
            .game-gene-warning {
                color: var(--warn-soft);
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.03em;
            }
            .game-gene-tooltip {
                position: absolute;
                left: 0;
                top: calc(100% + 8px);
                z-index: 21;
                width: min(360px, 65vw);
                padding: 10px 12px;
                background: var(--tooltip-bg);
                color: var(--text);
                border: 1px solid var(--accent);
                border-radius: 12px;
                box-shadow: 0 16px 32px rgba(0, 0, 0, 0.38);
                font-size: 12px;
                line-height: 1.6;
                display: none;
                white-space: normal;
                pointer-events: none;
            }
            .game-gene-tooltip::before {
                content: "";
                position: absolute;
                top: -5px;
                left: 16px;
                width: 8px;
                height: 8px;
                background: var(--tooltip-bg);
                border-left: 1px solid var(--accent);
                border-top: 1px solid var(--accent);
                transform: rotate(45deg);
            }
            .game-tooltip-code {
                display: block;
                color: var(--accent);
                font-weight: 800;
                font-size: 11px;
                margin-bottom: 6px;
                letter-spacing: 0.04em;
            }
            .game-tooltip-values {
                display: block;
                color: var(--soft);
                font-size: 11px;
                margin-top: 6px;
            }
            .game-result-gene:hover .game-gene-tooltip,
            .game-result-gene:focus-visible .game-gene-tooltip {
                display: block;
            }
            .game-base {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border-radius: 7px;
                font-weight: 800;
                line-height: 1;
                flex-shrink: 0;
                user-select: none;
            }
            .game-base-A {
                background: var(--A);
                color: var(--inverse-text);
            }
            .game-base-T {
                background: var(--T);
                color: var(--inverse-text);
            }
            .game-base-C {
                background: var(--C);
                color: #fff;
            }
            .game-base-G {
                background: var(--G);
                color: var(--inverse-text);
            }
            .game-base-sm {
                width: 22px;
                height: 22px;
                font-size: 11px;
            }
            .game-editable-base {
                cursor: pointer;
                border: 0;
                padding: 0;
                box-shadow: inset 0 0 0 1px transparent;
                transition:
                    transform 0.08s ease,
                    box-shadow 0.08s ease;
            }
            .game-editable-base:hover,
            .game-editable-base:focus-visible {
                transform: translateY(-1px);
                box-shadow:
                    inset 0 0 0 1px rgba(255, 255, 255, 0.35),
                    0 0 0 2px var(--accent-ring-strong);
                outline: none;
            }
            .game-btn-mini {
                padding: 5px 8px;
                font-size: 11px;
                border-radius: 8px;
                background: transparent;
                border: 1px solid var(--warn);
                color: var(--warn-soft);
                box-shadow: none;
            }
            .game-dim {
                color: var(--dim);
            }
            .game-muted {
                color: var(--muted);
            }
            @media (max-width: 720px) {
                .game-result-header {
                    flex-direction: column;
                    align-items: flex-start;
                }
                .game-strand-stack {
                    align-items: flex-start;
                    max-width: 100%;
                    width: 100%;
                }
                .game-strand-row {
                    flex-wrap: wrap;
                    justify-content: flex-start;
                }
                .game-strand-label {
                    width: auto;
                    flex-basis: 100%;
                    text-align: left;
                }
            }

            @media (max-width: 1000px) {
                main {
                    grid-template-columns: 1fr;
                }
                .prop {
                    grid-template-columns: 1fr;
                }
                .grid2,
                .grid3 {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Horsey Save Editor</h1>
            <p>
                Load a Horsey save file, choose a horse, edit its details,
                adjust its DNA, then export the updated save.
            </p>
        </header>
        <main>
            <aside class="stack">
                <section class="card">
                    <div class="hd">
                        <h2>Save file</h2>
                        <span class="pill" id="status">No file</span>
                    </div>
                    <div class="bd stack">
                        <input id="fileInput" type="file" />
                        <div class="row wrap">
                            <button disabled="" id="downloadBtn">
                                Export save1.dat
                            </button>
                            <button
                                class="secondary"
                                disabled=""
                                id="clearPatchesBtn"
                            >
                                Clear patches
                            </button>
                        </div>
                        <div class="small" id="summary">
                            Load a <span class="mono">save1.dat</span> file.
                        </div>
                        <div class="small" id="patchSummary"></div>
                    </div>
                </section>
                <section class="card">
                    <div class="hd">
                        <h2>Horse records</h2>
                        <span class="pill" id="recordCount">0</span>
                    </div>
                    <div class="bd stack">
                        <input
                            id="search"
                            placeholder="Search horse/name/record id…"
                            type="text"
                        />
                        <select id="filter">
							<option value="hasgenome">Has genome</option>
                            <option value="named">Named records</option>														
                            <option value="all">All records</option>
                        </select>
                        <div class="list" id="recordList"></div>
                    </div>
                </section>
            </aside>
            <section class="stack">
                <section class="card">
                    <div class="hd">
                        <h2>Player</h2>
                    </div>
                    <div class="bd stack">
                        <div class="prop-list" id="globalProps"></div>
                    </div>
                </section>
                <section class="card">
                    <div class="hd">
                        <h2 id="selectedTitle">No horse selected</h2>
                        <span class="pill" id="selectedMeta">—</span>
                    </div>
                    <div class="bd stack">
                        <div class="prop-list" id="horseProps"></div>
                        <div id="rawDnaBlock"></div>
                        <div id="detailBlocks"></div>
                    </div>
                </section>
                <section class="card">
                    <div class="hd">
                        <h2>Patch list</h2>
                        <span class="pill" id="patchCount">0 bytes</span>
                    </div>
                    <div class="bd">
                        <div class="hex" id="patchList">No mutations yet.</div>
                    </div>
                </section>
            </section>
        </main>
		<script id="byte-map" type="application/json">
{
  "0": {
    "name": "SIZE",
    "n": "ATGC"
  },
  "1": {
    "name": "ASPECT",
    "n": "GCAT"
  },
  "2": {
    "name": "SKINNY",
    "n": "GACT"
  },

                    const nameLen = u32(off);

                    const links = [];

                    ((pB >= 0 && pB < records.length)||pB == -1)
                )
                    return true;
                return false;
            }

            function recordName(idx) {
                if (idx < 0 || idx >= records.length) return "none";
                const n = records[idx].name || "(blank)";
                return `${n} #${idx}`;
            }

            function allOccurrencesU32(value, start = 0) {
                const b0 = value & 255,
                    b1 = (value >>> 8) & 255,
                    b2 = (value >>> 16) & 255,
                    b3 = (value >>> 24) & 255;
                const hits = [];
                for (let i = start; i + 3 < original.length; i++) {
                    if (
                        original[i] === b0 &&
                        original[i + 1] === b1 &&
                        original[i + 2] === b2 &&
                        original[i + 3] === b3
                    )
                        hits.push(i);
                }
                return hits;
            }

			
             function findHorseDetailBlocks(idx) {
                if (!original) return [];
				const detailBlocks = [];
				//if (idx<11) return [];
				for (let i in records[idx].detail_off){
					const off = records[idx].detail_off[i];
					if(!off) return [];
					//const hits = allOccurrencesU32(idx >>> 0, tableEnd);
					
					const status =
						off + 6 < original.length ? getByte(off + 6) : null;
					const age =
						off + 7 < original.length ? getByte(off + 7) : null;
					const personality =
						off + 9 < original.length ? getByte(off + 9) : null;	
						/*
						https://horseygame.miraheze.org/wiki/Personality
						0 = Normal
						1 = Preppy
						2 = Grump
						3 = Brainy
						4 = Swaggy
						5 = Cutey

						9 = Algernon de Horsey
						10 = Sweetie

						*/
					//off + 14 = tiredness? i think 10 (A) or above is tired. Need to Test
					//off + 6 could be horse status. 0 = ok 1= hot sauce,2=drunk ,3 =flu, 4=dead drunk?, 5=also drunk? 6=dead
					const ownerFlag =
						off + 10 < original.length ? getByte(off + 10) : null;

					const nearbyDna = [{ start: off-248, end: off-8, len:240, near:idx }];
					//if((age>0||idx>10)&&age>=0&&age<=11&&personality>=0&&personality<PERSONALITIES.length&&status>=0&&status<7){
					detailBlocks.push({ off, age, ownerFlag, nearbyDna });
					//}
				}
              			
				return detailBlocks;

            function findDnaRuns() {
				

				const codeSet = new Set([9, 10, 11, 12, 17, 18, 19, 20, 25, 26, 27, 28, 33, 34, 35, 36]);				
                
                let i = tableEnd;
				
                while (i < original.length) {
                    if (!codeSet.has(original[i])) {
                        i++;
                        continue;
                    }
                    let j = i;
					
                    while (j < original.length && codeSet.has(original[j])&& (j-i+1<=240)) j++;
                    const len = j - i;
                    if (len >= 240) {

						//for(let k=0;k<(len-239);k++){
						for(let k=0;k<1;k++){	 //temporary fixed at 1. need to rethink logic. might not need this check.
							const b0=original[j+8+k];					
							const b1=original[j+9+k];
							const b2=original[j+10+k];
							const b3=original[j+11+k];
							
							const tempindex=((b3*256+b2)*256+b1)*256+b0;						
							if(tempindex>=0&&tempindex<records.length){
								

								
								
								const off=j+8;
								const status =
									off + 6 < original.length ? getByte(off + 6) : null;
								const age =
									off + 7 < original.length ? getByte(off + 7) : null;
								const personality =
									off + 9 < original.length ? getByte(off + 9) : null;	
								if((age>0||tempindex>10)&&age>=0&&age<=11&&personality>=0&&personality<PERSONALITIES.length&&status>=0&&status<7){
									if(!records[tempindex].detail_off){
										records[tempindex].detail_off = [];
									}
								
									records[tempindex].detail_off.push(j+8);
								}									

							}
						}
						
                    }
                    i = j;
					
                }
                
            }

			function readGenome(genomeStart){
				let rows = 20;
				let arr = new Array(rows);		
			
				for (let i = 0; i < rows; i++) {
                    let strand1 = "";
                    let strand2 = "";				
					for (let j = 0; j < GENOME_MAP[i].length; j++) {
						
						const rawIndex=GENOME_MAP[i][j];
						const entry=BYTE_MAP[rawIndex];
						


						const pair = byteToPair(rawIndex, getByte(genomeStart + rawIndex));
						
						if (!pair ||pair.length !== 2||pair.includes("?") ){
							return [];
						}
						
						strand1 += pair[0];
						strand2 += pair[1];

					}
					arr[i] = [strand1,strand2];
				}
				return arr;
			
			}		
			function formatGenome(genome) {
				const lines = [];
				genome.forEach(([s1, s2], i) => {
					const label = String(i).padStart(2, "0");
					if (s1) lines.push(`${label}:${s1}`);
					if (s2) lines.push(`${label}:${s2}`);
				});
				return lines.join("<br>");
			}			

            function renderRawDnaBlock(blocks) {
                const host = $("rawDnaBlock");
                host.innerHTML = "";
                if (!blocks.length) {
                    const box = document.createElement("details");
                    box.open = true;
                    const sum = document.createElement("summary");
                    sum.textContent = "DNA Editor: no genome block found";
                    box.appendChild(sum);
                    const p = document.createElement("p");
                    p.className = "small";
                    p.textContent =
                        "A 240-byte genome block is expected immediately before the selected horse detail block, but no keyed detail block was found.";
                    box.appendChild(p);
                    host.appendChild(box);
                    return;
                }

                const detail = blocks[blocks.length - 1].off;
                const genomeStart = detail - 248;
                const genomeLen = 240;
                const adjacentStart = genomeStart + genomeLen;
				const idx=u32(detail);

                const box = document.createElement("details");
                box.open = true;
                const sum = document.createElement("summary");
                sum.textContent = "DNA Editor";
                box.appendChild(sum);

                if (
                    genomeStart < tableEnd ||
                    adjacentStart + 8 > original.length
                ) {
                    const warn = document.createElement("div");
                    warn.className = "warnbox small";
                    warn.textContent = `Could not place the genome block safely. detail=${hex(detail)}, genomeStart=${hex(genomeStart)}.`;
                    box.appendChild(warn);
                    host.appendChild(box);
                    return;
                }

                const G = GAME_DNA;

				let genome = readGenome(genomeStart);
				
                const writeByteSilently = (off, value) => {
                    value = Number(value) & 0xff;
                    if (value === original[off]) patches.delete(off);
                    else patches.set(off, value);
                };

                const applyGenomeToSave = (nextGenome) => {
					let failures = [];
					let rows = 20;	
				
					for (let i = 0; i < rows; i++) {

						for (let j = 0; j < GENOME_MAP[i].length; j++) {
							
							const rawIndex=GENOME_MAP[i][j];
                            if (rawIndex === null) {
                                failures.push(`${slot}: no raw index`);
                                continue;
                            }							
							const entry=BYTE_MAP[rawIndex];
							
							const p1 = nextGenome[i][0][j];
							const p2 = nextGenome[i][1][j];
							const pair = p1+""+p2;
							
							
							const nextByte = pairToByte(rawIndex, pair);
							if (nextByte === null) {
								failures.push(
									`${slot} raw[${rawIndex}] cannot encode ${pair}`,
								);
							}else{
								writeByteSilently(genomeStart + rawIndex, nextByte);	
							}							

						}
						
						
						
					}
					
					
                  
                    renderPatchState();
                    if (failures.length) {
                        alert(
                            "Some DNA values could not be written:\n" +
                                failures.slice(0, 12).join("\n") +
                                (failures.length > 12
                                    ? `\n…${failures.length - 12} more`
                                    : ""),
                        );
                    }
                    renderRawDnaBlock(findHorseDetailBlocks(idx));
                };

                const resetSelectedDna = () => {
                    for (let i = 0; i < genomeLen; i++)
                        patches.delete(genomeStart + i);
                    renderPatchState();
                    renderRawDnaBlock(findHorseDetailBlocks(idx));
                };

                const hasMergeableAlleles = (currentGenome) =>
                    G.HELIX_MAP.some((genes, hi) => {
                        const [s1 = "", s2 = ""] = currentGenome[hi] || [
                            "",
                            "",
                        ];
                        return genes.some((_, gi) =>
                            Boolean(s1[gi] && s2[gi] && s1[gi] !== s2[gi]),
                        );
                    });

                const mergeGeneAlleles = (currentGenome, hi, gi) => {
                    const [s1 = "", s2 = ""] = currentGenome[hi] || ["", ""];
                    const b1 = s1[gi];
                    const b2 = s2[gi];
                    const merged = b1 || b2;
                    if (!merged) return currentGenome;
                    const next = currentGenome.map(([a = "", b = ""]) => [
                        a,
                        b,
                    ]);
                    if (b1) {
                        const chars = next[hi][0].split("");
                        chars[gi] = merged;
                        next[hi][0] = chars.join("");
                    }
                    if (b2) {
                        const chars = next[hi][1].split("");
                        chars[gi] = merged;
                        next[hi][1] = chars.join("");
                    }
                    return next;
                };

                const mergeAllAlleles = (currentGenome) => {
                    let next = currentGenome.map(([a = "", b = ""]) => [a, b]);
                    G.HELIX_MAP.forEach((genes, hi) =>
                        genes.forEach((_, gi) => {
                            const [s1 = "", s2 = ""] = next[hi] || ["", ""];
                            if (s1[gi] && s2[gi] && s1[gi] !== s2[gi])
                                next = mergeGeneAlleles(next, hi, gi);
                        }),
                    );
                    return next;
                };

                const setBase = (currentGenome, hi, si, bi, nextBase) => {
                    const next = currentGenome.map(([a = "", b = ""]) => [
                        a,
                        b,
                    ]);
                    const chars = (next[hi][si] || "").split("");
                    chars[bi] = nextBase;
                    next[hi][si] = chars.join("");
                    return next;
                };

                const cycleGeneAt = (hi, gi) => {
                    const [s1 = "", s2 = ""] = genome[hi] || ["", ""];
                    const b1 = s1[gi];
                    const b2 = s2[gi];
                    if (!b1 && !b2) return;
                    let next = genome.map(([a = "", b = ""]) => [a, b]);
                    if (b1 && b2 && b1 === b2) {
                        const n = G.cycleBase(b1);
                        next = setBase(next, hi, 0, gi, n);
                        next = setBase(next, hi, 1, gi, n);
                    } else if (b1 && !b2)
                        next = setBase(next, hi, 0, gi, G.cycleBase(b1));
                    else if (!b1 && b2)
                        next = setBase(next, hi, 1, gi, G.cycleBase(b2));
                    applyGenomeToSave(next);
                };

                const cycleStrandBase = (hi, si, bi) => {
                    const strand = genome[hi][si] || "";
                    if (!strand[bi]) return;
                    applyGenomeToSave(
                        setBase(genome, hi, si, bi, G.cycleBase(strand[bi])),
                    );
                };

                const changedGenomeBytes = Array.from(
                    { length: genomeLen },
                    (_, i) => genomeStart + i,
                ).filter((off) => patches.has(off)).length;

                });
                const blankButton = G.createElement("button", {
                    type: "button",
                    class: "secondary",

                const randomButton = G.createElement("button", {
                    type: "button",
                    class: "secondary",
                    text: "Randomize genome",
                });
                const mergeAllButton = G.createElement("button", {
                    type: "button",
                    class: "secondary",
                    text: "Merge All",
                });
                const copyButton = G.createElement("button", {
                    type: "button",
                    class: "secondary",
                    text: "Copy Genome",
                });
                const resetButton = G.createElement("button", {
                    type: "button",
                    class: "secondary",
                    text: "Reset DNA patches",
                });
                if (!hasMergeableAlleles(genome))
                    mergeAllButton.style.display = "none";
                actions.append(
                    analyzeButton,
                    blankButton,
                    randomButton,
                    mergeAllButton,
                    copyButton,
                    resetButton,
                );

                analyzeButton.addEventListener("click", () =>
                    applyGenomeToSave(G.parseGenome(genomeInput.value)),
                );
                blankButton.addEventListener("click", () =>
                    applyGenomeToSave(G.makeUniformGenome("A")),
                );
                randomButton.addEventListener("click", () => {
                    const randomGenome = Array.from(
                        { length: G.HELIX_COUNT },
                        (_, hi) => {
                            const n = G.HELIX_MAP[hi]?.length ?? 0;
                            const randomBase = () =>
                                G.BASES[
                                    Math.floor(Math.random() * G.BASES.length)
                                ];
                            return [
                                Array.from({ length: n }, randomBase).join(""),
                                Array.from({ length: n }, randomBase).join(""),
                            ];
                        },
                    );
                    applyGenomeToSave(randomGenome);
                });
                mergeAllButton.addEventListener("click", () =>
                    applyGenomeToSave(mergeAllAlleles(genome)),
                );
                copyButton.addEventListener("click", async () => {
                    genomeInput.value = G.formatGenomeForExport(genome);
                    try {
                        await navigator.clipboard.writeText(genomeInput.value);
                        copyButton.textContent = "Copied";
                        window.setTimeout(
                            () => (copyButton.textContent = "Copy Genome"),
                            1200,
                        );
                    } catch {
                        genomeInput.focus();
                        genomeInput.select();
                        copyButton.textContent = "Select & Copy";
                        window.setTimeout(
                            () => (copyButton.textContent = "Copy Genome"),
                            1200,
                        );
                    }
                });
                resetButton.addEventListener("click", resetSelectedDna);

                const resultsRoot = G.createElement("div", {
                    class: "game-dna-results",
                });
                editor.appendChild(resultsRoot);

                const buildStrandPreviewRow = (label, strand, hi, si) => {
                    const row = G.createElement(
                        "div",
                        { class: "game-strand-row" },
                        [
                            G.createElement("span", {
                                class: "game-strand-label",
                                text: label,
                            }),
                        ],
                    );
                    strand
                        .split("")
                        .forEach((base, bi) =>
                            row.appendChild(
                                G.editableBase(
                                    base,
                                    () => cycleStrandBase(hi, si, bi),
                                    `${G.getHelixDisplayName(hi)} strand ${si + 1} position ${bi + 1}. Click to cycle base.`,
                                ),
                            ),
                        );
                    return row;
                };

                const buildStrandStack = (hi, s1, s2) => {
                    const stack = G.createElement("div", {
                        class: "game-strand-stack",
                    });
                    if (s1)
                        stack.appendChild(
                            buildStrandPreviewRow("S1", s1, hi, 0),
                        );
                    if (s2)
                        stack.appendChild(
                            buildStrandPreviewRow("S2", s2, hi, 1),
                        );
                    return stack;
                };

                G.HELIX_MAP.forEach((genes, hi) => {
                    const [s1 = "", s2 = ""] = genome[hi] || ["", ""];
                    const hasData = Boolean(s1 || s2);
                    const helixBlock = G.createElement("div", {
                        class: "game-result-helix",
                    });
                    const header = G.createElement("div", {
                        class: "game-result-header",
                    });
                    header.appendChild(
                        G.createElement(
                            "div",
                            { class: "game-result-heading" },
                            [
                                G.createElement("div", {
                                    class: "game-helix-title",
                                    text: G.getHelixDisplayName(hi),
                                }),
                                G.createElement("div", {
                                    class: "game-helix-subtitle",
                                    text: G.getHelixDescription(hi),
                                }),
                            ],
                        ),
                    );
                    if (hasData)
                        header.appendChild(buildStrandStack(hi, s1, s2));
                    else
                        header.appendChild(
                            G.createElement("span", {
                                class: "game-dim",
                                text: "no data",
                                style: "font-size:11px;align-self:center;",
                            }),
                        );
                    helixBlock.appendChild(header);
                    if (hasData) {
                        const body = G.createElement("div", {
                            class: "game-result-body",
                        });
                        const geneList = G.createElement("div", {
                            class: "game-result-genes",
                        });
                        genes.forEach((geneName, gi) => {
                            const gene = G.GENES[geneName];
                            const humanName =
                                G.GENE_HUMAN_NAMES[geneName] || geneName;
                            const categoryColor = gene
                                ? G.CAT_COLOR[gene.cat] || "#64748b"
                                : "#475569";
                            const b1 = s1?.[gi]?.toUpperCase();
                            const b2 = s2?.[gi]?.toUpperCase();
                            const v1 = G.getGeneValue(gene, b1);
                            const v2 = G.getGeneValue(gene, b2);
                            const isMixed = Boolean(b1 && b2) && b1 !== b2;
                            const tooltip = [
                                G.createElement("span", {
                                    class: "game-tooltip-code",
                                    text: geneName,
                                }),
                            ];
                            tooltip.push(
                                G.createElement("span", {
                                    text:
                                        gene?.desc ||
                                        "No custom description yet.",
                                }),
                            );
                            if (gene)
                                tooltip.push(
                                    G.createElement("span", {
                                        class: "game-tooltip-values",
                                        text: `Wiki values: ${G.alleleSummary(gene)}. Baseline m=${gene.m}, scale s=${gene.s}.`,
                                    }),
                                );
                            const card = G.createElement("button", {
                                type: "button",
                                class: "game-result-gene",
                                style: `border-color:${categoryColor}33`,
                                title: geneName,
                                "aria-label": `Gene ${geneName} on ${G.getHelixDisplayName(hi)} position ${gi + 1}.`,
                            });
                            if (!isMixed)
                                card.addEventListener("click", () =>
                                    cycleGeneAt(hi, gi),
                                );
                            card.appendChild(
                                G.createElement("div", {
                                    class: "game-rname",
                                    text: humanName,
                                    style: `color:${categoryColor}`,
                                }),
                            );
                            card.appendChild(
                                G.createElement("div", {
                                    class: "game-rpos",
                                    text: `${G.getHelixDisplayName(hi)} · P${gi}`,
                                }),
                            );
                            const valueRow = G.createElement("div", {
                                class: "game-rval",
                            });
                            if (b1)
                                valueRow.appendChild(
                                    G.createElement(
                                        "div",
                                        { class: "game-allele-line" },
                                        `<span class="game-dim">${isMixed ? "S1:" : "Allele:"}</span>${G.chip(b1)}<span class="game-muted">=</span><span style="color:${G.valueColor(v1)};font-weight:bold">${v1}</span>`,
                                    ),
                                );
                            if (isMixed && b2)
                                valueRow.appendChild(
                                    G.createElement(
                                        "div",
                                        { class: "game-allele-line" },
                                        `<span class="game-dim">S2:</span>${G.chip(b2)}<span class="game-muted">=</span><span style="color:${G.valueColor(v2)};font-weight:bold">${v2}</span>`,
                                    ),
                                );
                            if (!b1 && !b2)
                                valueRow.appendChild(
                                    G.createElement("span", {
                                        class: "game-dim",
                                        text: "—",
                                    }),
                                );
                            card.appendChild(valueRow);
                            if (isMixed) {
                                const mixedRow = G.createElement(
                                    "div",
                                    { class: "game-gene-mixed-row" },
                                    [
                                        G.createElement("span", {
                                            class: "game-gene-warning",
                                            text: "MIXED ALLELES",
                                        }),
                                    ],
                                );
                                const mergeButton = G.createElement("button", {
                                    type: "button",
                                    class: "game-btn-mini",
                                    text: "Merge",
                                });
                                mergeButton.addEventListener(
                                    "click",
                                    (event) => {
                                        event.stopPropagation();
                                        applyGenomeToSave(
                                            mergeGeneAlleles(genome, hi, gi),
                                        );
                                    },
                                );
                                mixedRow.appendChild(mergeButton);
                                card.appendChild(mixedRow);
                            }
                            card.appendChild(
                                G.createElement(
                                    "div",
                                    { class: "game-gene-tooltip" },
                                    tooltip,
                                ),
                            );
                            geneList.appendChild(card);
                        });
                        body.appendChild(geneList);
                        helixBlock.appendChild(body);
                    }
                    resultsRoot.appendChild(helixBlock);
                });

                box.appendChild(editor);
                host.appendChild(box);
            }

            function renderDetailBlocks(blocks) {
                const host = $("detailBlocks");
                host.innerHTML = "";                
                const card = document.createElement("details");
                card.open = true;
                const summary = document.createElement("summary");                
				summary.textContent = `Entity/detail blocks: ${blocks.length}`;
                card.appendChild(summary);

                if (blocks.length === 0) {
                    const p = document.createElement("p");
                    p.className = "small";
                    p.textContent =
                        "No keyed detail block found after the object table.";
                    card.appendChild(p);
                }

                blocks.forEach((b, bi) => {
                    const wrap = document.createElement("div");
                    wrap.className = "stack";
                    wrap.style.marginTop = "10px";
                    const title = document.createElement("div");
                    title.innerHTML = `<span class="pill">block ${bi + 1}</span> <span class="mono">${hex(b.off)}</span>`;
                    wrap.appendChild(title);

                    const plist = document.createElement("div");
                    plist.className = "prop-list";
                    plist.appendChild(
                        propRow(
                            "Block bytes",
                            document.createTextNode(
                                bytesHex(
                                    b.off-8,
                                    Math.min(55, original.length - b.off+8),
                                ),
                            ),
                            "first 55 bytes",
                        ),
                    );
                    wrap.appendChild(plist);

                    if (b.nearbyDna.length) {
                        const d = document.createElement("div");
                        d.className = "goodbox small";
						d.innerHTML = `Nearby DNA-like run(s): ${b.nearbyDna.map(r => 
  '<span class="mono">' + hex(r.start) + ' (' + r.len + ' bytes) <br>' + formatGenome(readGenome(r.start)) + '</span>'
).join(", ")}`;
                        wrap.appendChild(d);
                    }
                    card.appendChild(wrap);
                });

                host.appendChild(card);
            }

 



            function renderPatchState() {
                $("downloadBtn").disabled = !original;
                $("clearPatchesBtn").disabled = !original || patches.size === 0;
                $("patchCount").textContent = `${patches.size} bytes`;
                $("patchSummary").textContent = patches.size
                    ? `${patches.size} byte mutation(s) pending.`
                    : "No mutations pending.";
                if (!patches.size) {
                    $("patchList").textContent = "No mutations yet.";
                    return;
                }
                const entries = [...patches.entries()].sort(
                    (a, b) => a[0] - b[0],
                );
                $("patchList").textContent = entries
                    .map(
                        ([off, val]) =>
                            `${hex(off, 6)}: ${original[off].toString(16).padStart(2, "0")} -> ${val.toString(16).padStart(2, "0")}`,
                    )
                    .join("\n");
            }

            $("fileInput").addEventListener("change", async (ev) => {
                const file = ev.target.files[0];
                if (!file) return;
                fileName = file.name || "save1.dat";
                const buf = await file.arrayBuffer();
                original = new Uint8Array(buf);
                view = new DataView(buf);
                patches.clear();
                selectedIndex = -1;
                try {
                    parseSave();
                    const test = records.find((r) => r.name === "TEST HORSE");
                    const val = records.find((r) => r.name === "Valedictorian");
                    selectedIndex = test
                        ? test.idx
                        : val
                          ? val.idx
                          : records.findIndex(isLikelyHorse);
                    renderAll();
                } catch (e) {
                    original = null;
                    view = null;
                    records = [];
                    tableEnd = 0;
                    
                    alert("Could not parse save: " + e.message);
                    renderAll();
                }
            });

            $("search").addEventListener("input", renderRecords);
            $("filter").addEventListener("change", renderRecords);

            $("downloadBtn").addEventListener("click", () => {
                if (!original) return;
                const out = new Uint8Array(original);
                for (const [off, val] of patches) out[off] = val;
                const blob = new Blob([out], {
                    type: "application/octet-stream",
                });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = "save1.dat";
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    URL.revokeObjectURL(a.href);
                    a.remove();
                }, 1000);
            });

            $("clearPatchesBtn").addEventListener("click", () => {
                patches.clear();
                renderAll();
            });

            renderAll();
        </script>
    </body>
</html>
