                    );
                }

                // for (let n = 14; n <= 17; n++) {
                //     props.appendChild(
                //         propRow(
                //             `fixed[${n}]`,
                //             makeNumberInput(
                //                 getByte(r.fixedOffset + n),
                //                 0,
                //                 255,
                //                 (v) => {
                //                     setByte(r.fixedOffset + n, v);
                //                     renderSelected();
                //                     renderRecords();
                //                 },
                //             ),
                //             null,
                //         ),
                //     );
                // }

                const links = document.createElement("div");
                links.className = "row wrap";
                if (r.links.length === 0)
                    links.innerHTML = `<span class="small">No offspring links.</span>`;
                for (const l of r.links) {
                    const b = document.createElement("button");
                    b.className = "secondary";
                    b.textContent = recordName(l);
                    b.addEventListener("click", () => {
                        selectedIndex = l;
                        renderRecords();
                        renderSelected();
                    });
                    links.appendChild(b);
                }
                props.appendChild(propRow("Offspring", links, null));

                renderRawDnaBlock(r.idx);
                renderDetailBlocks(r.idx);
            }

            function makeHexByteInput(off, extraClass = "") {
                const input = document.createElement("input");
                input.type = "text";
                input.maxLength = 2;
                input.className = "dna-byte " + extraClass;
                input.value = getByte(off).toString(16).padStart(2, "0");
                input.title = `${hex(off)} original ${original[off].toString(16).padStart(2, "0")}`;
                if (patches.has(off)) input.classList.add("changed");
                input.addEventListener("change", () => {
                    const raw = input.value.trim().replace(/^0x/i, "");
                    const v = Number.parseInt(raw, 16);
                    if (!Number.isFinite(v) || v < 0 || v > 255) {
                        input.value = getByte(off)
                            .toString(16)
                            .padStart(2, "0");
                        alert("Enter a hex byte from 00 to ff.");
                        return;
                    }
                    setByte(off, v);
                    renderRawDnaBlock(selectedIndex);
                });
                return input;
            }

            function renderRawDnaBlock(idx) {
                const host = $("rawDnaBlock");
                host.innerHTML = "";
                if (!original || idx < 0 || idx >= records.length) return;

                const blocks = findHorseDetailBlocks(idx);
                if (!blocks.length) {
                    const box = document.createElement("details");
                    box.open = true;
                    const sum = document.createElement("summary");
                    sum.textContent = "DNA Editor: no genome block found";
                    box.appendChild(sum);
                    const p = document.createElement("p");
                    p.className = "small";
                    p.textContent =
                        "A 240-byte genome block is expected immediately before the selected horse detail block, but no keyed detail block was found.";
                    box.appendChild(p);
                    host.appendChild(box);
                    return;
                }

                const detail = blocks[blocks.length - 1].off;
                const genomeStart = detail - 248;
                const genomeLen = 240;
                const adjacentStart = genomeStart + genomeLen;

                const box = document.createElement("details");
                box.open = true;
                const sum = document.createElement("summary");
                sum.textContent = "DNA Editor";
                box.appendChild(sum);

                if (
                    genomeStart < tableEnd ||
                    adjacentStart + 8 > original.length
                ) {
                    const warn = document.createElement("div");
                    warn.className = "warnbox small";
                    warn.textContent = `Could not place the genome block safely. detail=${hex(detail)}, genomeStart=${hex(genomeStart)}.`;
                    box.appendChild(warn);
                    host.appendChild(box);
                    return;
                }

                const G = GAME_DNA;

                const readGenomeFromSave = () => {
                    return Array.from({ length: G.HELIX_COUNT }, (_, chrom) => {
                        let strand1 = "";
                        let strand2 = "";
                        const genes = G.HELIX_MAP[chrom] || [];
                        for (let pos = 0; pos < genes.length; pos++) {
                            const slot = `${String(chrom).padStart(2, "0")}:${pos}`;
                            const rawIndex = rawIndexForSlot(slot);
                            if (rawIndex === null) continue;
                            const pair = byteToPair(
                                rawIndex,
                                getByte(genomeStart + rawIndex),
                            );
                            if (
                                !pair ||
                                pair.length !== 2 ||
                                pair.includes("?")
                            )
                                continue;
                            strand1 += pair[0];
                            strand2 += pair[1];
                        }
                        return [strand1, strand2];
                    });
                };

                const originalGenome = (() => {
                    return Array.from({ length: G.HELIX_COUNT }, (_, chrom) => {
                        let strand1 = "";
                        let strand2 = "";
                        const genes = G.HELIX_MAP[chrom] || [];
                        for (let pos = 0; pos < genes.length; pos++) {
                            const slot = `${String(chrom).padStart(2, "0")}:${pos}`;
                            const rawIndex = rawIndexForSlot(slot);
                            if (rawIndex === null) continue;
                            const pair = byteToPair(
                                rawIndex,
                                original[genomeStart + rawIndex],
                            );
                            if (
                                !pair ||
                                pair.length !== 2 ||
                                pair.includes("?")
                            )
                                continue;
                            strand1 += pair[0];
                            strand2 += pair[1];
                        }
                        return [strand1, strand2];
                    });
                })();

                let genome = readGenomeFromSave();

                const writeByteSilently = (off, value) => {
                    value = Number(value) & 0xff;
                    if (value === original[off]) patches.delete(off);
                    else patches.set(off, value);
                };

                const applyGenomeToSave = (nextGenome) => {
                    let failures = [];
                    for (let chrom = 0; chrom < G.HELIX_COUNT; chrom++) {
                        const genes = G.HELIX_MAP[chrom] || [];
                        const [s1 = "", s2 = ""] = nextGenome[chrom] || [
                            "",
                            "",
                        ];
                        for (let pos = 0; pos < genes.length; pos++) {
                            const b1 = s1[pos];
                            const b2 = s2[pos];
                            if (!b1 || !b2) continue;
                            const slot = `${String(chrom).padStart(2, "0")}:${pos}`;
                            const rawIndex = rawIndexForSlot(slot);
                            if (rawIndex === null) {
                                failures.push(`${slot}: no raw index`);
                                continue;
                            }
                            const pair = `${b1}${b2}`;
                            const nextByte = pairToByte(rawIndex, pair);
                            if (nextByte === null) {
                                failures.push(
                                    `${slot} raw[${rawIndex}] cannot encode ${pair}`,
                                );
                                continue;
                            }
                            writeByteSilently(genomeStart + rawIndex, nextByte);
                        }
                    }
                    renderPatchState();
                    if (failures.length) {
                        alert(
                            "Some DNA values could not be written:\n" +
                                failures.slice(0, 12).join("\n") +
                                (failures.length > 12
                                    ? `\n…${failures.length - 12} more`
                                    : ""),
                        );
                    }
                    renderRawDnaBlock(idx);
                };

                const resetSelectedDna = () => {
                    for (let i = 0; i < genomeLen; i++)
                        patches.delete(genomeStart + i);
                    renderPatchState();
                    renderRawDnaBlock(idx);
                };

                const hasMergeableAlleles = (currentGenome) =>
                    G.HELIX_MAP.some((genes, hi) => {
                        const [s1 = "", s2 = ""] = currentGenome[hi] || [
                            "",
                            "",
                        ];
                        return genes.some((_, gi) =>
                            Boolean(s1[gi] && s2[gi] && s1[gi] !== s2[gi]),
                        );
                    });

                const mergeGeneAlleles = (currentGenome, hi, gi) => {
                    const [s1 = "", s2 = ""] = currentGenome[hi] || ["", ""];
                    const b1 = s1[gi];
                    const b2 = s2[gi];
                    const merged = b1 || b2;
                    if (!merged) return currentGenome;
                    const next = currentGenome.map(([a = "", b = ""]) => [
                        a,
                        b,
                    ]);
                    if (b1) {
                        const chars = next[hi][0].split("");
                        chars[gi] = merged;
                        next[hi][0] = chars.join("");
                    }
                    if (b2) {
                        const chars = next[hi][1].split("");
                        chars[gi] = merged;
                        next[hi][1] = chars.join("");
                    }
                    return next;
                };

                const mergeAllAlleles = (currentGenome) => {
                    let next = currentGenome.map(([a = "", b = ""]) => [a, b]);
                    G.HELIX_MAP.forEach((genes, hi) =>
                        genes.forEach((_, gi) => {
                            const [s1 = "", s2 = ""] = next[hi] || ["", ""];
                            if (s1[gi] && s2[gi] && s1[gi] !== s2[gi])
                                next = mergeGeneAlleles(next, hi, gi);
                        }),
                    );
                    return next;
                };

                const setBase = (currentGenome, hi, si, bi, nextBase) => {
                    const next = currentGenome.map(([a = "", b = ""]) => [
                        a,
                        b,
                    ]);
                    const chars = (next[hi][si] || "").split("");
                    chars[bi] = nextBase;
                    next[hi][si] = chars.join("");
                    return next;
                };

                const cycleGeneAt = (hi, gi) => {
                    const [s1 = "", s2 = ""] = genome[hi] || ["", ""];
                    const b1 = s1[gi];
                    const b2 = s2[gi];
                    if (!b1 && !b2) return;
                    let next = genome.map(([a = "", b = ""]) => [a, b]);
                    if (b1 && b2 && b1 === b2) {
                        const n = G.cycleBase(b1);
                        next = setBase(next, hi, 0, gi, n);
                        next = setBase(next, hi, 1, gi, n);
                    } else if (b1 && !b2)
                        next = setBase(next, hi, 0, gi, G.cycleBase(b1));
                    else if (!b1 && b2)
                        next = setBase(next, hi, 1, gi, G.cycleBase(b2));
                    applyGenomeToSave(next);
                };

                const cycleStrandBase = (hi, si, bi) => {
                    const strand = genome[hi][si] || "";
                    if (!strand[bi]) return;
                    applyGenomeToSave(
                        setBase(genome, hi, si, bi, G.cycleBase(strand[bi])),
                    );
                };

                const changedGenomeBytes = Array.from(
                    { length: genomeLen },
                    (_, i) => genomeStart + i,
                ).filter((off) => patches.has(off)).length;

                const editor = document.createElement("div");
                editor.className = "game-dna-editor";

                const toolbar = G.createElement("div", {
                    class: "game-dna-toolbar",
                });
                toolbar.appendChild(
                    G.createElement("div", { class: "game-dna-legend" }, [
                        G.createElement("span", {
                            class: "pill good",
                            text: "in-game DNA format",
                        }),
                        G.createElement("span", {
                            class: "pill",
                            text: `detail ${hex(detail)}`,
                        }),
                        G.createElement("span", {
                            class: "pill",
                            text: `genome ${hex(genomeStart)}..${hex(genomeStart + genomeLen)}`,
                        }),
                        G.createElement("span", {
                            class: "pill",
                            text: `${changedGenomeBytes} DNA byte patch(es)`,
                        }),
                    ]),
                );
                const actions = G.createElement("div", { class: "row wrap" });
                toolbar.appendChild(actions);
                editor.appendChild(toolbar);

                const inputWrap = G.createElement("div", {
                    class: "game-dna-input",
                });
                const genomeInput = G.createElement("textarea", {
                    rows: "8",
                    value: G.formatGenomeForExport(genome),
                    placeholder: "00:TTTTTTTTTT\n00:CCCCCCCCCC",
                });
                inputWrap.appendChild(genomeInput);
                editor.appendChild(inputWrap);

                const analyzeButton = G.createElement("button", {
                    type: "button",
                    class: "secondary",
                    text: "Analyze / apply genome text",
                });
                const blankButton = G.createElement("button", {
                    type: "button",
                    class: "secondary",
                    text: "Load blank A genome",
                });
                const randomButton = G.createElement("button", {
                    type: "button",
                    class: "secondary",
                    text: "Randomize genome",
                });
                const mergeAllButton = G.createElement("button", {
                    type: "button",
                    class: "secondary",
                    text: "Merge All",
                });
                const copyButton = G.createElement("button", {
                    type: "button",
                    class: "secondary",
                    text: "Copy Genome",
                });
                const resetButton = G.createElement("button", {
                    type: "button",
                    class: "secondary",
                    text: "Reset DNA patches",
                });
                if (!hasMergeableAlleles(genome))
                    mergeAllButton.style.display = "none";
                actions.append(
                    analyzeButton,
                    blankButton,
                    randomButton,
                    mergeAllButton,
                    copyButton,
                    resetButton,
                );

                analyzeButton.addEventListener("click", () =>
                    applyGenomeToSave(G.parseGenome(genomeInput.value)),
                );
                blankButton.addEventListener("click", () =>
                    applyGenomeToSave(G.makeUniformGenome("A")),
                );
                randomButton.addEventListener("click", () => {
                    const randomGenome = Array.from(
                        { length: G.HELIX_COUNT },
                        (_, hi) => {
                            const n = G.HELIX_MAP[hi]?.length ?? 0;
                            const randomBase = () =>
                                G.BASES[
                                    Math.floor(Math.random() * G.BASES.length)
                                ];
                            return [
                                Array.from({ length: n }, randomBase).join(""),
                                Array.from({ length: n }, randomBase).join(""),
                            ];
                        },
                    );
                    applyGenomeToSave(randomGenome);
                });
                mergeAllButton.addEventListener("click", () =>
                    applyGenomeToSave(mergeAllAlleles(genome)),
                );
                copyButton.addEventListener("click", async () => {
                    genomeInput.value = G.formatGenomeForExport(genome);
                    try {
                        await navigator.clipboard.writeText(genomeInput.value);
                        copyButton.textContent = "Copied";
                        window.setTimeout(
                            () => (copyButton.textContent = "Copy Genome"),
                            1200,
                        );
                    } catch {
                        genomeInput.focus();
                        genomeInput.select();
                        copyButton.textContent = "Select & Copy";
                        window.setTimeout(
                            () => (copyButton.textContent = "Copy Genome"),
                            1200,
                        );
                    }
                });
                resetButton.addEventListener("click", resetSelectedDna);

                const resultsRoot = G.createElement("div", {
                    class: "game-dna-results",
                });
                editor.appendChild(resultsRoot);

                const buildStrandPreviewRow = (label, strand, hi, si) => {
                    const row = G.createElement(
                        "div",
                        { class: "game-strand-row" },
                        [
                            G.createElement("span", {
                                class: "game-strand-label",
                                text: label,
                            }),
                        ],
                    );
                    strand
                        .split("")
                        .forEach((base, bi) =>
                            row.appendChild(
                                G.editableBase(
                                    base,
                                    () => cycleStrandBase(hi, si, bi),
                                    `${G.getHelixDisplayName(hi)} strand ${si + 1} position ${bi + 1}. Click to cycle base.`,
                                ),
                            ),
                        );
                    return row;
                };

                const buildStrandStack = (hi, s1, s2) => {
                    const stack = G.createElement("div", {
                        class: "game-strand-stack",
                    });
                    if (s1)
                        stack.appendChild(
                            buildStrandPreviewRow("S1", s1, hi, 0),
                        );
                    if (s2)
                        stack.appendChild(
                            buildStrandPreviewRow("S2", s2, hi, 1),
                        );
                    return stack;
                };

                G.HELIX_MAP.forEach((genes, hi) => {
                    const [s1 = "", s2 = ""] = genome[hi] || ["", ""];
                    const hasData = Boolean(s1 || s2);
                    const helixBlock = G.createElement("div", {
                        class: "game-result-helix",
                    });
                    const header = G.createElement("div", {
                        class: "game-result-header",
                    });
                    header.appendChild(
                        G.createElement(
                            "div",
                            { class: "game-result-heading" },
                            [
                                G.createElement("div", {
                                    class: "game-helix-title",
                                    text: G.getHelixDisplayName(hi),
                                }),
                                G.createElement("div", {
                                    class: "game-helix-subtitle",
                                    text: G.getHelixDescription(hi),
                                }),
                            ],
                        ),
                    );
                    if (hasData)
                        header.appendChild(buildStrandStack(hi, s1, s2));
                    else
                        header.appendChild(
                            G.createElement("span", {
                                class: "game-dim",
                                text: "no data",
                                style: "font-size:11px;align-self:center;",
                            }),
                        );
                    helixBlock.appendChild(header);
                    if (hasData) {
                        const body = G.createElement("div", {
                            class: "game-result-body",
                        });
                        const geneList = G.createElement("div", {
                            class: "game-result-genes",
                        });
                        genes.forEach((geneName, gi) => {
                            const gene = G.GENES[geneName];
                            const humanName =
                                G.GENE_HUMAN_NAMES[geneName] || geneName;
                            const categoryColor = gene
                                ? G.CAT_COLOR[gene.cat] || "#64748b"
                                : "#475569";
                            const b1 = s1?.[gi]?.toUpperCase();
                            const b2 = s2?.[gi]?.toUpperCase();
                            const v1 = G.getGeneValue(gene, b1);
                            const v2 = G.getGeneValue(gene, b2);
                            const isMixed = Boolean(b1 && b2) && b1 !== b2;
                            const tooltip = [
                                G.createElement("span", {
                                    class: "game-tooltip-code",
                                    text: geneName,
                                }),
                            ];
                            tooltip.push(
                                G.createElement("span", {
                                    text:
                                        gene?.desc ||
                                        "No custom description yet.",
                                }),
                            );
                            if (gene)
                                tooltip.push(
                                    G.createElement("span", {
                                        class: "game-tooltip-values",
                                        text: `Wiki values: ${G.alleleSummary(gene)}. Baseline m=${gene.m}, scale s=${gene.s}.`,
                                    }),
                                );
                            const card = G.createElement("button", {
                                type: "button",
                                class: "game-result-gene",
                                style: `border-color:${categoryColor}33`,
                                title: geneName,
                                "aria-label": `Gene ${geneName} on ${G.getHelixDisplayName(hi)} position ${gi + 1}.`,
                            });
                            if (!isMixed)
                                card.addEventListener("click", () =>
                                    cycleGeneAt(hi, gi),
                                );
                            card.appendChild(
                                G.createElement("div", {
                                    class: "game-rname",
                                    text: humanName,
                                    style: `color:${categoryColor}`,
                                }),
                            );
                            card.appendChild(
                                G.createElement("div", {
                                    class: "game-rpos",
                                    text: `${G.getHelixDisplayName(hi)} · P${gi}`,
                                }),
                            );
                            const valueRow = G.createElement("div", {
                                class: "game-rval",
                            });
                            if (b1)
                                valueRow.appendChild(
                                    G.createElement(
                                        "div",
                                        { class: "game-allele-line" },
                                        `<span class="game-dim">${isMixed ? "S1:" : "Allele:"}</span>${G.chip(b1)}<span class="game-muted">=</span><span style="color:${G.valueColor(v1)};font-weight:bold">${v1}</span>`,
                                    ),
                                );
                            if (isMixed && b2)
                                valueRow.appendChild(
                                    G.createElement(
                                        "div",
                                        { class: "game-allele-line" },
                                        `<span class="game-dim">S2:</span>${G.chip(b2)}<span class="game-muted">=</span><span style="color:${G.valueColor(v2)};font-weight:bold">${v2}</span>`,
                                    ),
                                );
                            if (!b1 && !b2)
                                valueRow.appendChild(
                                    G.createElement("span", {
                                        class: "game-dim",
                                        text: "—",
                                    }),
                                );
                            card.appendChild(valueRow);
                            if (isMixed) {
                                const mixedRow = G.createElement(
                                    "div",
                                    { class: "game-gene-mixed-row" },
                                    [
                                        G.createElement("span", {
                                            class: "game-gene-warning",
                                            text: "MIXED ALLELES",
                                        }),
                                    ],
                                );
                                const mergeButton = G.createElement("button", {
                                    type: "button",
                                    class: "game-btn-mini",
                                    text: "Merge",
                                });
                                mergeButton.addEventListener(
                                    "click",
                                    (event) => {
                                        event.stopPropagation();
                                        applyGenomeToSave(
                                            mergeGeneAlleles(genome, hi, gi),
                                        );
                                    },
                                );
                                mixedRow.appendChild(mergeButton);
                                card.appendChild(mixedRow);
                            }
                            card.appendChild(
                                G.createElement(
                                    "div",
                                    { class: "game-gene-tooltip" },
                                    tooltip,
                                ),
                            );
                            geneList.appendChild(card);
                        });
                        body.appendChild(geneList);
                        helixBlock.appendChild(body);
                    }
                    resultsRoot.appendChild(helixBlock);
                });

                box.appendChild(editor);
                host.appendChild(box);
            }

            function renderDetailBlocks(idx) {
                const host = $("detailBlocks");
                host.innerHTML = "";
                const blocks = findHorseDetailBlocks(idx);
                const card = document.createElement("details");
                card.open = true;
                const summary = document.createElement("summary");
                summary.textContent = `Entity/detail blocks keyed by record #${idx}: ${blocks.length}`;
                card.appendChild(summary);

                if (blocks.length === 0) {
                    const p = document.createElement("p");
                    p.className = "small";
                    p.textContent =
                        "No keyed detail block found after the object table.";
                    card.appendChild(p);
                }

                blocks.forEach((b, bi) => {
                    const wrap = document.createElement("div");
                    wrap.className = "stack";
                    wrap.style.marginTop = "10px";
                    const title = document.createElement("div");
                    title.innerHTML = `<span class="pill">block ${bi + 1}</span> <span class="mono">${hex(b.off)}</span>`;
                    wrap.appendChild(title);

                    const plist = document.createElement("div");
                    plist.className = "prop-list";
                    plist.appendChild(
                        propRow(
                            "Block bytes",
                            document.createTextNode(
                                bytesHex(
                                    b.off,
                                    Math.min(64, original.length - b.off),
                                ),
                            ),
                            "first 64 bytes",
                        ),
                    );
                    wrap.appendChild(plist);

                    if (b.nearbyDna.length) {
                        const d = document.createElement("div");
                        d.className = "goodbox small";
                        d.innerHTML = `Nearby DNA-like run(s): ${b.nearbyDna.map((r) => `<span class="mono">${hex(r.start)} (${r.len} bytes)</span>`).join(", ")}`;
                        wrap.appendChild(d);
                    }
                    card.appendChild(wrap);
                });

                host.appendChild(card);
            }

            function renderSections() {
                const box = $("sectionList");
                if (!box) return;
                box.innerHTML = "";
                if (!original) return;
                function row(name, start, len, note) {
                    const div = document.createElement("div");
                    div.className = "section-row";
                    div.innerHTML = `<strong>${name}</strong><span class="mono">${hex(start)}</span><span class="mono">${len}</span><span class="small">${note}</span>`;
                    box.appendChild(div);
                }
                row(
                    "Header",
                    0,
                    0x14,
                    "u32/u64/u32/u32 header; count lives at +0x10",
                );
                row(
                    "Object table",
                    0x14,
                    tableEnd - 0x14,
                    "1990s-style records: name, 18 fixed bytes, offspring links",
                );
                row(
                    "Global/player block",
                    tableEnd,
                    0x80,
                    "money is confirmed at +0x14; surrounding fields still unknown",
                );
                row(
                    "Post-table entity blob",
                    tableEnd,
                    original.length - tableEnd,
                    "contains keyed entity/detail blocks, map/items/tile data, and DNA-like data",
                );
                row(
                    "DNA-like runs",
                    dnaRuns.length ? dnaRuns[0].start : 0,
                    dnaRuns.length,
                    "count of detected long compact genome-like byte runs",
                );
            }

            function renderDnaRuns() {
                const host = $("dnaRuns");
                const count = $("dnaCount");
                if (!host || !count) return;
                host.innerHTML = "";
                count.textContent = String(dnaRuns.length);
                if (!original) return;

                let runs = dnaRuns;
                if (selectedIndex >= 0) {
                    const blocks = findHorseDetailBlocks(selectedIndex);
                    const selectedRelated = dnaRuns.filter(
                        (r) =>
                            blocks.some(
                                (b) =>
                                    r.start >= b.off && r.start <= b.off + 420,
                            ) ||
                            (r.near && r.near.idx === selectedIndex),
                    );
                    if (selectedRelated.length)
                        runs = selectedRelated.concat(
                            dnaRuns
                                .filter((r) => !selectedRelated.includes(r))
                                .slice(0, 10),
                        );
                    else runs = dnaRuns.slice(0, 25);
                } else {
                    runs = dnaRuns.slice(0, 25);
                }

                runs.forEach((r, i) => {
                    const det = document.createElement("details");
                    det.open = i < 3;
                    const near = r.near
                        ? ` · nearest record: ${recordName(r.near.idx)} at -${r.near.distance} bytes`
                        : " · no nearby record id";
                    det.innerHTML =
                        `<summary><span class="mono">${hex(r.start)}</span> — ${r.len} bytes${near}</summary>` +
                        `<div class="small" style="margin-top:8px">First 96 bytes:</div>` +
                        `<div class="hex mono">${bytesHex(r.start, Math.min(96, r.len))}</div>`;
                    host.appendChild(det);
                });
            }

            function renderPatchState() {
                $("downloadBtn").disabled = !original;
                $("clearPatchesBtn").disabled = !original || patches.size === 0;
                $("patchCount").textContent = `${patches.size} bytes`;
                $("patchSummary").textContent = patches.size
                    ? `${patches.size} byte mutation(s) pending.`
                    : "No mutations pending.";
                if (!patches.size) {
                    $("patchList").textContent = "No mutations yet.";
                    return;
                }
                const entries = [...patches.entries()].sort(
                    (a, b) => a[0] - b[0],
                );
                $("patchList").textContent = entries
                    .map(
                        ([off, val]) =>
                            `${hex(off, 6)}: ${original[off].toString(16).padStart(2, "0")} -> ${val.toString(16).padStart(2, "0")}`,
                    )
                    .join("\n");
            }

            $("fileInput").addEventListener("change", async (ev) => {
                const file = ev.target.files[0];
                if (!file) return;
                fileName = file.name || "save1.dat";
                const buf = await file.arrayBuffer();
                original = new Uint8Array(buf);
                view = new DataView(buf);
                patches.clear();
                selectedIndex = -1;
                try {
                    parseSave();
                    const test = records.find((r) => r.name === "TEST HORSE");
                    const val = records.find((r) => r.name === "Valedictorian");
                    selectedIndex = test
                        ? test.idx
                        : val
                          ? val.idx
                          : records.findIndex(isLikelyHorse);
                    renderAll();
                } catch (e) {
                    original = null;
                    view = null;
                    records = [];
                    tableEnd = 0;
                    dnaRuns = [];
                    alert("Could not parse save: " + e.message);
                    renderAll();
                }
            });

            $("search").addEventListener("input", renderRecords);
            $("filter").addEventListener("change", renderRecords);

            $("downloadBtn").addEventListener("click", () => {
                if (!original) return;
                const out = new Uint8Array(original);
                for (const [off, val] of patches) out[off] = val;
                const blob = new Blob([out], {
                    type: "application/octet-stream",
                });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = "save1.dat";
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    URL.revokeObjectURL(a.href);
                    a.remove();
                }, 1000);
            });

            $("clearPatchesBtn").addEventListener("click", () => {
                patches.clear();
                renderAll();
            });

            renderAll();
        </script>
    </body>
</html>
