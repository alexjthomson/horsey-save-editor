<!doctype html>

<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width,initial-scale=1" name="viewport" />
        <title>Horsey Save Editor</title>
        <style>
            :root {
                --bg: #151922;
                --panel: #1e2633;
                --panel2: #252f3f;
                --panel3: #2d394c;
                --text: #edf2f7;
                --muted: #9aa8bb;
                --soft: #c7d2e1;
                --border: #3b4a61;
                --accent: #7dd3fc;
                --good: #86efac;
                --warn: #facc15;
                --bad: #fb7185;
                --shadow: rgba(0, 0, 0, 0.28);
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                background: linear-gradient(180deg, #111722, var(--bg));
                color: var(--text);
                font:
                    14px/1.45 system-ui,
                    Segoe UI,
                    Roboto,
                    Arial,
                    sans-serif;
            }
            header {
                padding: 24px;
                border-bottom: 1px solid var(--border);
                background: #1a2230;
            }
            h1 {
                margin: 0 0 6px;
                font-size: 24px;
            }
            h2 {
                margin: 0 0 14px;
                font-size: 18px;
            }
            h3 {
                margin: 0 0 10px;
                font-size: 15px;
            }
            p {
                margin: 8px 0;
                color: var(--soft);
            }
            code,
            .mono {
                font-family:
                    "Fira Code", "Cascadia Code", ui-monospace, SFMono-Regular,
                    Menlo, Consolas, monospace;
            }
            main {
                display: grid;
                grid-template-columns: 380px 1fr;
                gap: 16px;
                padding: 16px;
                max-width: 1500px;
                margin: 0 auto;
            }
            .card {
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 16px;
                box-shadow: 0 10px 28px var(--shadow);
                overflow: hidden;
            }
            .card .hd {
                padding: 14px 16px;
                background: var(--panel2);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
            }
            .card .bd {
                padding: 14px 16px;
            }
            .stack {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .row {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .row.wrap {
                flex-wrap: wrap;
            }
            .spread {
                justify-content: space-between;
            }
            input,
            select,
            button,
            textarea {
                font: inherit;
            }
            input[type="file"],
            input[type="text"],
            input[type="number"],
            select,
            textarea {
                background: #111827;
                color: var(--text);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 8px 10px;
            }
            input[type="number"] {
                width: 120px;
            }
            button {
                background: linear-gradient(180deg, #38bdf8, #0284c7);
                border: 0;
                color: #041018;
                font-weight: 700;
                border-radius: 10px;
                padding: 9px 12px;
                cursor: pointer;
            }
            button.secondary {
                background: #334155;
                color: var(--text);
                border: 1px solid var(--border);
            }
            button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            .small {
                font-size: 12px;
                color: var(--muted);
            }
            .pill {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                border: 1px solid var(--border);
                background: #111827;
                border-radius: 999px;
                padding: 3px 8px;
                font-size: 12px;
                color: var(--soft);
            }
            .pill.good {
                border-color: #22c55e66;
                color: var(--good);
            }
            .pill.warn {
                border-color: #eab30866;
                color: var(--warn);
            }
            .pill.bad {
                border-color: #f43f5e66;
                color: var(--bad);
            }
            .list {
                max-height: 70vh;
                overflow: auto;
                display: flex;
                flex-direction: column;
                gap: 8px;
                padding-right: 4px;
            }
            .item {
                border: 1px solid var(--border);
                background: #172030;
                border-radius: 12px;
                padding: 10px;
                cursor: pointer;
            }
            .item:hover,
            .item.active {
                border-color: var(--accent);
                background: #1c2a3d;
            }
            .item .name {
                font-weight: 750;
            }
            .grid2 {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .grid3 {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }
            .prop-list {
                display: flex;
                flex-direction: column;
                border: 1px solid var(--border);
                border-radius: 14px;
                overflow: hidden;
            }
            .prop {
                display: grid;
                grid-template-columns: 230px 180px 1fr;
                gap: 10px;
                align-items: center;
                padding: 10px 12px;
                border-bottom: 1px solid var(--border);
                background: #172030;
            }
            .prop:last-child {
                border-bottom: 0;
            }
            .prop:nth-child(even) {
                background: #192335;
            }
            .prop label {
                font-weight: 650;
                color: #e5edf8;
            }
            .derived {
                color: var(--muted);
            }
            .section-row {
                display: grid;
                grid-template-columns: 150px 120px 110px 1fr;
                gap: 10px;
                align-items: center;
                padding: 9px 10px;
                border-bottom: 1px solid var(--border);
            }
            .section-row:last-child {
                border-bottom: 0;
            }
            .hex {
                white-space: pre-wrap;
                word-break: break-word;
                background: #101722;
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 10px;
                color: #d7e2f0;
                max-height: 220px;
                overflow: auto;
            }
            .warnbox {
                border: 1px solid #eab30866;
                background: #42200655;
                border-radius: 12px;
                padding: 10px;
                color: #fde68a;
            }
            .goodbox {
                border: 1px solid #22c55e66;
                background: #052e1655;
                border-radius: 12px;
                padding: 10px;
                color: #bbf7d0;
            }
            details {
                border: 1px solid var(--border);
                border-radius: 12px;
                background: #172030;
                padding: 10px;
            }
            summary {
                cursor: pointer;
                font-weight: 700;
            }
            .dna-table {
                display: flex;
                flex-direction: column;
                gap: 6px;
                margin-top: 10px;
            }
            .dna-row {
                display: grid;
                grid-template-columns: 70px repeat(16, minmax(34px, 1fr));
                gap: 4px;
                align-items: center;
            }
            .dna-off {
                font-size: 11px;
                color: var(--muted);
            }
            .dna-byte {
                width: 100%;
                min-width: 32px;
                text-align: center;
                padding: 5px 2px;
                border-radius: 8px;
                font-family:
                    "Fira Code", "Cascadia Code", ui-monospace, SFMono-Regular,
                    Menlo, Consolas, monospace;
                text-transform: lowercase;
            }
            .dna-byte.changed {
                border-color: var(--warn);
                box-shadow: 0 0 0 1px #eab30855;
            }
            .adjacent-grid {
                display: grid;
                grid-template-columns: repeat(8, minmax(44px, 1fr));
                gap: 6px;
            }

            .mapped-dna-editor {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .dna-toolbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-wrap: wrap;
                gap: 10px;
                border: 1px solid var(--border);
                background: #172030;
                border-radius: 14px;
                padding: 10px;
            }
            .dna-legend {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }
            .helix-grid {
                display: grid;
                gap: 12px;
            }
            .helix {
                border: 1px solid var(--border);
                background: #111827;
                border-radius: 16px;
                overflow: hidden;
            }
            .helix-head {
                padding: 10px 12px;
                background: var(--panel2);
                border-bottom: 1px solid var(--border);
                display: flex;
                justify-content: space-between;
                gap: 10px;
                align-items: center;
            }
            .helix-title {
                font-weight: 800;
                font-family:
                    "Fira Code", "Cascadia Code", ui-monospace, SFMono-Regular,
                    Menlo, Consolas, monospace;
            }
            .strands {
                padding: 12px;
                display: grid;
                gap: 8px;
                overflow-x: auto;
            }
            .strand {
                display: grid;
                grid-template-columns: 42px max-content;
                gap: 10px;
                align-items: center;
            }
            .strand-label {
                color: var(--muted);
                font-family:
                    "Fira Code", "Cascadia Code", ui-monospace, SFMono-Regular,
                    Menlo, Consolas, monospace;
                font-size: 12px;
            }
            .bases {
                display: flex;
                gap: 5px;
            }
            .base {
                width: 32px;
                height: 32px;
                border-radius: 10px;
                border: 1px solid var(--border);
                background: #111827;
                font-family:
                    "Fira Code", "Cascadia Code", ui-monospace, SFMono-Regular,
                    Menlo, Consolas, monospace;
                font-weight: 800;
                color: var(--text);
                display: inline-grid;
                place-items: center;
                padding: 0;
            }
            .base:hover:not(:disabled) {
                border-color: var(--accent);
                background: #1c2a3d;
            }
            .base.changed {
                color: var(--warn);
                border-color: #eab308aa;
                box-shadow: inset 0 0 0 1px #eab30833;
            }
            .base.unresolved {
                color: var(--bad);
                border-color: #f43f5e66;
            }
            .base:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }
            .raw-wrap {
                max-height: 420px;
                overflow: auto;
                border: 1px solid var(--border);
                border-radius: 14px;
            }
            .raw-table {
                width: 100%;
                border-collapse: collapse;
                font-family:
                    "Fira Code", "Cascadia Code", ui-monospace, SFMono-Regular,
                    Menlo, Consolas, monospace;
                font-size: 12px;
            }
            .raw-table th,
            .raw-table td {
                border-bottom: 1px solid var(--border);
                padding: 7px 8px;
                text-align: left;
                white-space: nowrap;
            }
            .raw-table th {
                color: var(--muted);
                background: var(--panel2);
                position: sticky;
                top: 0;
            }
            .raw-table tr.changed td {
                color: var(--warn);
            }

            /* In-game DNA editor merged from the C.R.I.S.P.R editor. */
            .game-dna-editor {
                --A: #facc15;
                --T: #fb7185;
                --C: #60a5fa;
                --G: #4ade80;
                --inverse-text: #181b22;
                --accent-soft: rgba(56, 189, 248, 0.16);
                --accent-ring-strong: rgba(125, 211, 252, 0.62);
                --green-hi: #86efac;
                --red-lo: #fca5a5;
                --warn-soft: #fde68a;
                --dim: #748297;
                --chip-label: #c8d3df;
                --gene-card-bg: #202733;
                --tooltip-bg: #161d26;
                display: grid;
                gap: 12px;
            }
            .game-dna-toolbar {
                display: flex;
                justify-content: space-between;
                gap: 12px;
                align-items: flex-start;
                flex-wrap: wrap;
            }
            .game-dna-input {
                display: grid;
                gap: 10px;
            }
            .game-dna-input textarea {
                min-height: 150px;
                font-family:
                    "Fira Code", "Cascadia Code", ui-monospace, SFMono-Regular,
                    Menlo, Consolas, monospace;
                line-height: 1.45;
            }
            .game-dna-legend {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }
            .game-dna-results {
                display: grid;
                gap: 12px;
            }
            .game-result-helix {
                background: #172030;
                border: 1px solid var(--border);
                border-radius: 16px;
                box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
                overflow: visible;
            }
            .game-result-header {
                display: flex;
                align-items: stretch;
                justify-content: space-between;
                gap: 14px;
                padding: 13px 15px;
                background: linear-gradient(
                    180deg,
                    var(--panel3),
                    var(--panel2)
                );
                border-bottom: 1px solid var(--border);
                border-top-left-radius: 16px;
                border-top-right-radius: 16px;
            }
            .game-result-header:only-child {
                border-bottom-left-radius: 16px;
                border-bottom-right-radius: 16px;
                border-bottom: none;
            }
            .game-result-heading {
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 3px;
                min-width: 0;
                flex: 1 1 auto;
            }
            .game-helix-title {
                font-weight: 800;
                font-size: 14px;
                letter-spacing: 0.01em;
                line-height: 1.25;
            }
            .game-helix-subtitle {
                color: var(--soft);
                font-size: 12px;
                font-weight: 600;
                opacity: 0.92;
            }
            .game-result-body {
                padding: 14px 16px 16px;
            }
            .game-strand-stack {
                display: flex;
                flex-direction: column;
                gap: 6px;
                align-items: flex-end;
                justify-content: center;
                flex: 0 0 auto;
                max-width: 58%;
            }
            .game-strand-row {
                display: flex;
                align-items: center;
                justify-content: flex-end;
                gap: 6px;
                flex-wrap: nowrap;
                min-height: 22px;
            }
            .game-strand-label {
                color: var(--chip-label);
                font-size: 10px;
                font-weight: 800;
                width: 24px;
                flex: 0 0 24px;
                text-align: right;
                letter-spacing: 0.06em;
            }
            .game-result-genes {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                align-items: stretch;
            }
            .game-result-gene {
                position: relative;
                z-index: 0;
                background: var(--gene-card-bg);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 10px;
                min-width: 154px;
                cursor: pointer;
                text-align: left;
                color: inherit;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                align-items: flex-start;
                transition:
                    border-color 0.12s ease,
                    transform 0.08s ease,
                    box-shadow 0.12s ease;
            }
            .game-result-gene:hover,
            .game-result-gene:focus-visible {
                z-index: 20;
                border-color: var(--accent) !important;
                outline: none;
                transform: translateY(-1px);
                box-shadow:
                    0 0 0 3px var(--accent-soft),
                    0 10px 20px rgba(0, 0, 0, 0.18);
            }
            .game-rpos {
                color: var(--dim);
                font-size: 10px;
                font-weight: 600;
                margin-top: 3px;
            }
            .game-rname {
                font-size: 12px;
                font-weight: 800;
                margin: 0 0 2px;
                letter-spacing: 0.02em;
                line-height: 1.3;
            }
            .game-rval {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
                font-size: 11px;
                margin-top: 8px;
            }
            .game-allele-line {
                display: flex;
                align-items: center;
                gap: 4px;
                flex-wrap: wrap;
            }
            .game-gene-mixed-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
                margin-top: 8px;
                width: 100%;
            }
            .game-gene-warning {
                color: var(--warn-soft);
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.03em;
            }
            .game-gene-tooltip {
                position: absolute;
                left: 0;
                top: calc(100% + 8px);
                z-index: 21;
                width: min(360px, 65vw);
                padding: 10px 12px;
                background: var(--tooltip-bg);
                color: var(--text);
                border: 1px solid var(--accent);
                border-radius: 12px;
                box-shadow: 0 16px 32px rgba(0, 0, 0, 0.38);
                font-size: 12px;
                line-height: 1.6;
                display: none;
                white-space: normal;
                pointer-events: none;
            }
            .game-gene-tooltip::before {
                content: "";
                position: absolute;
                top: -5px;
                left: 16px;
                width: 8px;
                height: 8px;
                background: var(--tooltip-bg);
                border-left: 1px solid var(--accent);
                border-top: 1px solid var(--accent);
                transform: rotate(45deg);
            }
            .game-tooltip-code {
                display: block;
                color: var(--accent);
                font-weight: 800;
                font-size: 11px;
                margin-bottom: 6px;
                letter-spacing: 0.04em;
            }
            .game-tooltip-values {
                display: block;
                color: var(--soft);
                font-size: 11px;
                margin-top: 6px;
            }
            .game-result-gene:hover .game-gene-tooltip,
            .game-result-gene:focus-visible .game-gene-tooltip {
                display: block;
            }
            .game-base {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border-radius: 7px;
                font-weight: 800;
                line-height: 1;
                flex-shrink: 0;
                user-select: none;
            }
            .game-base-A {
                background: var(--A);
                color: var(--inverse-text);
            }
            .game-base-T {
                background: var(--T);
                color: var(--inverse-text);
            }
            .game-base-C {
                background: var(--C);
                color: #fff;
            }
            .game-base-G {
                background: var(--G);
                color: var(--inverse-text);
            }
            .game-base-sm {
                width: 22px;
                height: 22px;
                font-size: 11px;
            }
            .game-editable-base {
                cursor: pointer;
                border: 0;
                padding: 0;
                box-shadow: inset 0 0 0 1px transparent;
                transition:
                    transform 0.08s ease,
                    box-shadow 0.08s ease;
            }
            .game-editable-base:hover,
            .game-editable-base:focus-visible {
                transform: translateY(-1px);
                box-shadow:
                    inset 0 0 0 1px rgba(255, 255, 255, 0.35),
                    0 0 0 2px var(--accent-ring-strong);
                outline: none;
            }
            .game-btn-mini {
                padding: 5px 8px;
                font-size: 11px;
                border-radius: 8px;
                background: transparent;
                border: 1px solid var(--warn);
                color: var(--warn-soft);
                box-shadow: none;
            }
            .game-dim {
                color: var(--dim);
            }
            .game-muted {
                color: var(--muted);
            }
            @media (max-width: 720px) {
                .game-result-header {
                    flex-direction: column;
                    align-items: flex-start;
                }
                .game-strand-stack {
                    align-items: flex-start;
                    max-width: 100%;
                    width: 100%;
                }
                .game-strand-row {
                    flex-wrap: wrap;
                    justify-content: flex-start;
                }
                .game-strand-label {
                    width: auto;
                    flex-basis: 100%;
                    text-align: left;
                }
            }

            @media (max-width: 1000px) {
                main {
                    grid-template-columns: 1fr;
                }
                .prop {
                    grid-template-columns: 1fr;
                }
                .grid2,
                .grid3 {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Horsey Save Editor</h1>
            <p>
                Load a Horsey save file, choose a horse, edit its details,
                adjust its DNA, then export the updated save.
            </p>
        </header>
        <main>
            <aside class="stack">
                <section class="card">
                    <div class="hd">
                        <h2>Save file</h2>
                        <span class="pill" id="status">No file</span>
                    </div>
                    <div class="bd stack">
                        <input id="fileInput" type="file" />
                        <div class="row wrap">
                            <button disabled="" id="downloadBtn">
                                Export save1.dat
                            </button>
                            <button
                                class="secondary"
                                disabled=""
                                id="clearPatchesBtn"
                            >
                                Clear patches
                            </button>
                        </div>
                        <div class="small" id="summary">
                            Load a <span class="mono">save1.dat</span> file.
                        </div>
                        <div class="small" id="patchSummary"></div>
                    </div>
                </section>
                <section class="card">
                    <div class="hd">
                        <h2>Horse records</h2>
                        <span class="pill" id="recordCount">0</span>
                    </div>
                    <div class="bd stack">
                        <input
                            id="search"
                            placeholder="Search horse/name/record id…"
                            type="text"
                        />
                        <select id="filter">
                            <option value="named">Named records</option>
                            <option value="all">All records</option>
                        </select>
                        <div class="list" id="recordList"></div>
                    </div>
                </section>
            </aside>
            <section class="stack">
                <section class="card">
                    <div class="hd">
                        <h2>Player</h2>
                    </div>
                    <div class="bd stack">
                        <div class="prop-list" id="globalProps"></div>
                    </div>
                </section>
                <section class="card">
                    <div class="hd">
                        <h2 id="selectedTitle">No horse selected</h2>
                        <span class="pill" id="selectedMeta">—</span>
                    </div>
                    <div class="bd stack">
                        <div class="prop-list" id="horseProps"></div>
                        <div id="rawDnaBlock"></div>
                        <div id="detailBlocks"></div>
                    </div>
                </section>
                <section class="card">
                    <div class="hd">
                        <h2>Patch list</h2>
                        <span class="pill" id="patchCount">0 bytes</span>
                    </div>
                    <div class="bd">
                        <div class="hex" id="patchList">No mutations yet.</div>
                    </div>
                </section>
            </section>
        </main>
        <script id="raw-visible-map" type="application/json">
            {
                "ignored_raw_indices": [78],
                "model": "two_config_ordered_pair_barcode",
                "raw_to_visible": {
                    "000": {
                        "canonical_index": 70,
                        "chromosome": 6,
                        "decoded": ["CA", "CG"],
                        "position": 0,
                        "raw_index": 0,
                        "visible": "06:0"
                    },

                const makeUniformGenome = (base = "A") =>

                const EMPTY_GENOME = () => makeUniformGenome("");
                function createHumanGeneName(rawName) {

                        WHITE_IS_LETHAL: "White Is Lethal",
                        SPINAL_LOCO: "Spinal Locomotion",
                        LOCO_SYNC: "Locomotion Sync",
                        LITTER_SIZE: "Litter Size",
                        OLD_AGE: "Old Age",
                        HIGH_INTELLECT: "High Intellect",
                        FLU_IMMUNITY: "Flu Immunity",
                        HEAD_X_GROWTH: "Head X Growth",
                        HEAD_Y_GROWTH: "Head Y Growth",
                        EYEBOX_X: "Eye Box X",
                        EYEBOX_Y: "Eye Box Y",
                        EYEBOX_SIZE: "Eye Box Size",
                        UPARM_Y: "Upper Arm Y",
                        UPARM_TAG: "Upper Arm Tag",
                        UPARM_GOOFY: "Upper Arm Goofy",
                        UPARM_ANGLE: "Upper Arm Angle",
                        NECK_ONTOP: "Neck On Top",
                        FOOT_IS_HOOF: "Foot Is Hoof",
                        FOOT_IS_CIRCLE: "Foot Is Circle",
                        LEG_IS_CIRCLE: "Leg Is Circle",
                        HAT_POM_IS_LID: "Hat Pom Is Lid",
                        POM_USECOLOR: "Pom Use Color",
                        ANTLER_SCALEH: "Antler Scale Height",
                        ANTLER_SCALEW: "Antler Scale Width",
                        ANTLER_ANGLE_RAND: "Antler Angle Randomness",
                        HAT_ANGLE_RAND: "Hat Angle Randomness",

                        .split("_")

                function createElement(tag, attrs = {}, children = []) {

                        else if (k === "text") e.textContent = v;

                        ? children
                        : [children]) {
                        if (child == null) continue;

                            e.insertAdjacentHTML("beforeend", child);
                        else e.appendChild(child);
                    }
                    return e;
                }
                function sanitizeSequence(value) {
                    return String(value || "")
                        .toUpperCase()
                        .replace(VALID_BASE_RE, "");
                }
                function normalizeGenome(genome) {
                    return genome.map(([s1 = "", s2 = ""]) => [
                        sanitizeSequence(s1),
                        sanitizeSequence(s2),
                    ]);
                }
                function cycleBase(base) {
                    const i = BASES.indexOf(base);
                    return BASES[(i + 1 + BASES.length) % BASES.length];
                }
                function baseChip(base, size = "sm") {
                    return BASES.includes(base)
                        ? `<span class="base base-${base} base-${size}">${base}</span>`
                        : '<span class="muted">?</span>';
                }
                function valueColor(v) {
                    if (v == null) return "var(--muted)";
                    if (v > 0) return "var(--green-hi)";
                    if (v < 0) return "var(--red-lo)";
                    return "var(--muted)";
                }
                function getGeneValue(gene, base) {
                    if (
                        !gene ||
                        !Object.prototype.hasOwnProperty.call(BASE_INDEX, base)
                    )
                        return null;
                    return gene.g[BASE_INDEX[base]];
                }
                function getHelixDisplayName(i) {
                    return `Helix ${i}`;
                }
                function getHelixDescription(i) {
                    return HELIX_DESCRIPTIONS[i] || "Unknown";
                }
                function alleleSummary(gene) {
                    return `A=${gene.g[0]}, T=${gene.g[1]}, C=${gene.g[2]}, G=${gene.g[3]}`;
                }
                function getHelixIndexFactory() {
                    const m = new Map();
                    let next = 0;
                    return (raw) => {
                        const label = String(raw).toUpperCase();
                        if (/^\d{1,2}$/.test(label)) {
                            const i = Number.parseInt(label, 10);
                            return i >= 0 && i < HELIX_COUNT ? i : -1;
                        }
                        if (!m.has(label)) {
                            if (next >= HELIX_COUNT) return -1;
                            m.set(label, next++);
                        }
                        return m.get(label);
                    };
                }
                function parseGenome(text) {
                    const genome = EMPTY_GENOME();
                    const lines = String(text || "")
                        .trim()
                        .split("\n")
                        .map((l) => l.trim())
                        .filter(Boolean);
                    const getHelixIndex = getHelixIndexFactory();
                    let current = -1;
                    const patterns = {
                        newFormat: /^([A-Za-z0-9]+)\s*:\s*([atcg]+)$/i,
                        numbered: /^(\d{1,2})\s*:\s*([atcg]+)$/i,
                        verboseBoth:
                            /^helix\s*([A-Za-z0-9]+)[^:)]*[:\)]\s*([atcg]+)\s*:\s*(?:second\s*strand|strand\s*2)[^:]*:\s*([atcg]+)$/i,
                        verboseFirst:
                            /^helix\s*([A-Za-z0-9]+)[^:)]*[:\)]\s*([atcg]+)$/i,
                        verboseSecond:
                            /^(?:second\s*strand|strand\s*2)[^:]*:\s*([atcg]+)$/i,
                        bareStrand: /^[atcg]+$/i,
                    };
                    function assign(i, seq) {
                        if (i < 0 || i >= HELIX_COUNT) return;
                        if (!genome[i][0]) genome[i][0] = seq;
                        else genome[i][1] = seq;
                    }
                    for (const line of lines) {
                        let match = line.match(patterns.newFormat);
                        if (match) {
                            assign(
                                getHelixIndex(match[1]),
                                match[2].toUpperCase(),
                            );
                            continue;
                        }
                        match = line.match(patterns.numbered);
                        if (match) {
                            assign(
                                Number.parseInt(match[1], 10),
                                match[2].toUpperCase(),
                            );
                            continue;
                        }
                        match = line.match(patterns.verboseBoth);
                        if (match) {
                            current = getHelixIndex(match[1]);
                            if (current >= 0) {
                                genome[current][0] = match[2].toUpperCase();
                                genome[current][1] = match[3].toUpperCase();
                            }
                            continue;
                        }
                        match = line.match(patterns.verboseFirst);
                        if (match) {
                            current = getHelixIndex(match[1]);
                            if (current >= 0)
                                genome[current][0] = match[2].toUpperCase();
                            continue;
                        }
                        match = line.match(patterns.verboseSecond);
                        if (match && current >= 0) {
                            genome[current][1] = match[1].toUpperCase();
                            continue;
                        }
                        if (
                            current >= 0 &&
                            !genome[current][1] &&
                            patterns.bareStrand.test(line)
                        )
                            genome[current][1] = line.toUpperCase();
                    }
                    return normalizeGenome(genome);
                }
                function formatGenomeForExport(genome) {
                    const lines = [];
                    genome.forEach(([s1, s2], i) => {
                        const label = String(i).padStart(2, "0");
                        if (s1) lines.push(`${label}:${s1}`);
                        if (s2) lines.push(`${label}:${s2}`);
                    });

                }
                function createEditableBase(base, onActivate, label) {
                    const b = createElement("button", {
                        type: "button",

                        e.stopPropagation();

                }

                function chip(base, size = "sm") {

                        ? `<span class="game-base game-base-${base} game-base-${size}">${base}</span>`
                        : '<span class="game-muted">?</span>';
                }
                function editableBase(base, onActivate, label) {
                    const b = createElement("button", {
                        type: "button",

                        "aria-label": label,

                    HELIX_COUNT,
                    BASES,

                    CAT_COLOR,

            let original = null;
            let view = null;
            let fileName = "save1.dat";
            let records = [];
            let tableEnd = 0;
            let selectedIndex = -1;
            let patches = new Map();
            let dnaRuns = [];

            const RAW_VISIBLE = JSON.parse(
                document.getElementById("raw-visible-map").textContent,
            );
            const BYTE_MAP = JSON.parse(
                document.getElementById("byte-map").textContent,
            );
            const BASES = ["A", "C", "G", "T"];

            function rawIndexForSlot(slot) {

            }

            function slotForRawIndex(rawIndex) {
                const row =
                    RAW_VISIBLE.raw_to_visible[
                        String(rawIndex).padStart(3, "0")
                    ];
                return row && !row.ignored ? row.visible : null;
            }

            function pairToByte(rawIndex, pair) {
                const entry = BYTE_MAP.raw_indices[rawIndex];
                if (!entry || !entry.pair_to_byte) return null;
                const value = entry.pair_to_byte[pair];
                if (value === undefined) return null;
                return typeof value === "number"
                    ? value
                    : Number.parseInt(String(value), 16);
            }

            function byteToPair(rawIndex, byte) {
                const entry = BYTE_MAP.raw_indices[rawIndex];
                if (!entry || !entry.pair_to_byte) return null;
                for (const [pair, value] of Object.entries(
                    entry.pair_to_byte,
                )) {
                    const n =
                        typeof value === "number"
                            ? value
                            : Number.parseInt(String(value), 16);
                    if (n === byte) return pair;
                }
                return null;
            }

            function chromosomeLengths() {
                const raw = BYTE_MAP.chromosome_lengths || {};
                const out = [];
                for (let i = 0; i < 20; i++) {
                    out.push(Number(raw[String(i)] ?? raw[i] ?? 0));
                }
                return out;
            }

            function cycleBase(base) {
                const i = BASES.indexOf(base);
                return BASES[(i + 1) % BASES.length] || "A";
            }

            const $ = (id) => document.getElementById(id);

            function hex(n, width = 0) {
                const s = Number(n).toString(16);
                return "0x" + (width ? s.padStart(width, "0") : s);
            }
            function u32(off) {
                return view.getUint32(off, true);
            }
            function i32(off) {
                return view.getInt32(off, true);
            }
            function f32(off) {
                return view.getFloat32(off, true);

            function getU32Patched(off) {

                            .padStart(2, "0"),
                    );

            function parseSave() {
                records = [];

                    throw new Error("File too small");

                for (let idx = 0; idx < count; idx++) {
                    if (off + 4 > original.length)
                        throw new Error(
                            `Record ${idx}: missing name length at ${hex(off)}`,
                        );
                    const nameLen = u32(off);
                    const nameStart = off + 4;
                    const nameEnd = nameStart + nameLen;
                    const fixedOffset = nameEnd;
                    const fixedEnd = fixedOffset + 18;
                    const linkCountOffset = fixedEnd;
                    if (
                        nameEnd > original.length ||
                        linkCountOffset + 4 > original.length
                    ) {
                        throw new Error(
                            `Record ${idx}: truncated at ${hex(off)}`,
                        );

                        throw new Error(

                        name,
                        fixedOffset,
                        linkCountOffset,

                    r.name === "TEST HORSE" ||
                    r.name === "Valedictorian" ||
                    r.name === "Terms And Conditions"
                )
                    return true;
                if (
                    pA >= 0 &&
                    pA < records.length &&
                    pB >= 0 &&
                    pB < records.length

                    return true;

            }

            function recordName(idx) {

            }

            function allOccurrencesU32(value, start = 0) {

                    b2 = (value >>> 16) & 255,
                    b3 = (value >>> 24) & 255;

                for (let i = start; i + 3 < original.length; i++) {

                        original[i + 1] === b1 &&
                        original[i + 2] === b2 &&
                        original[i + 3] === b3

                }
                return hits;
            }

            function findDnaRuns() {
                const codeSet = new Set([

                    0x19, 0x1a, 0x1c, 0x21, 0x22, 0x23,

                    while (j < original.length && codeSet.has(original[j])) j++;

                                idx: v,

                const parentAOff = r.fixedOffset + 6;

                                renderRecords();

                props.appendChild(

                                renderSelected();
                                renderRecords();
                            },
                            "160px",
                        ),
                        recordName(getI32Patched(parentBOff)),
                    ),
                );

                const detailBlocks = findHorseDetailBlocks(r.idx);
                const primaryDetail = detailBlocks.length
                    ? detailBlocks[detailBlocks.length - 1]
                    : null;
                if (primaryDetail && primaryDetail.off + 8 < original.length) {
                    props.appendChild(
                        propRow(
                            "Age",
                            makeNumberInput(
                                getByte(primaryDetail.off + 7),

                                (v) => {

                    );

                if (primaryDetail && primaryDetail.off + 11 < original.length) {
                    props.appendChild(
                        propRow(
                            "Owner flag",
                            makeNumberInput(

                                0,

                                    renderSelected();
                                    renderRecords();
